<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Universo Mágico: Daniela ✨</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #overlay {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10;
        }
        .header h1 {
            color: white; font-size: 1rem; letter-spacing: 5px; opacity: 0.5;
            text-shadow: 0 0 15px #ba55d3; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="overlay">
    <div class="header"><h1>Magical Universe ✨</h1></div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010002);
scene.fog = new THREE.FogExp2(0x010002, 0.004);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 30, 80);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 2;   
controls.maxDistance = 250; 
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;

function createStarTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 64; canvas.height = 64;
    const ctx = canvas.getContext('2d');
    const grad = ctx.createRadialGradient(32,32,0, 32,32,32);
    grad.addColorStop(0, 'rgba(255,255,255,1)');
    grad.addColorStop(0.3, 'rgba(150,200,255,0.6)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad; ctx.fillRect(0,0,64,64);
    return new THREE.CanvasTexture(canvas);
}
const starTex = createStarTexture();

// NÚCLEO
const core = new THREE.Group();
const coreMesh = new THREE.Mesh(
    new THREE.IcosahedronGeometry(2.5, 10),
    new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.4 })
);
core.add(coreMesh);
const coreGlow = new THREE.Sprite(new THREE.SpriteMaterial({ map: starTex, color: 0x9932cc, blending: THREE.AdditiveBlending }));
coreGlow.scale.set(20, 20, 1);
core.add(coreGlow);
scene.add(core);

// ESTRELLAS MASIVAS
const starCount = 50000;
const starPos = new Float32Array(starCount * 3);
for(let i=0; i<starCount; i++) {
    const r = Math.random() * 300;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos((Math.random() * 2) - 1);
    starPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
    starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    starPos[i*3+2] = r * Math.cos(phi);
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starPoints = new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 0.12, map: starTex, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));
scene.add(starPoints);

// LISTA COMPLETA DE PALABRAS
const listaPalabras = [
    "Expecto Amorum ✨", "Patronus del Alma 🦌", "Lumos ✨", "Siempre ⚡", "Amortentia ❤️", 
    "Daniela 🌹", "Gabriel 🧪", "Lumos Maxima 💫", "Accio Amor 🤍", "Hechizo Eterno 🪄", 
    "Phoenix Soul 🔥", "Universo Hechizado 🌌", "Destino Encantado ✨", "Daniela ✨", "Tu Alma Brilla ⭐", 
    "Reliquia Astral 💎", "Corazón Galáctico 💫", "Fuego Cósmico 🔥", "Amor Entre Galaxias 🌙", 
    "Gabriel & Daniela 🌌", "Tu Esencia es Magia ✨", "Patronus Eterno 🦌", "Alquimia Emocional ⚗️", 
    "Constelación Eterna 🌌", "Tu Magia Permanece 🪄", "Daniela 🌙", "Siempre en mi Universo 🌌", 
    "Lumos Maxima 💫", "Tu voz es mi Patronus 🦉", "Magia Antigua 📜", "Moonlight Magic 🌙", 
    "Guardianes del Cielo 🌠", "Tu Corazón Ilumina ✨", "Polvo Mágico ⭐", "Fénix Celestial 🔥",
    "Ingeniería Aeronáutica ✈️", "Mecánica Astral ⚙️", "Fuerza Voluntad 💪", "Lealtad Infinita 🤝",
    "Valentía de Gryffindor 🔥", "Sabiduría Eterna 📚", "Hogwarts en el Corazón 🏰", "Daniela 💖",
    "Electrónica Galáctica ⚡", "Vuelo Infinito 🦅", "Coincidir 🌌", "Eternidad ✨", "Tú y Yo 🌙",
    "Destino 💫", "Te Amo Daniela ❤️", "Amor Puro 🤍", "Eres Magia ✨", "Gabriel 🪐"
];

const textGroup = new THREE.Group();
const colors = ['#00d4ff', '#ff00ff', '#ffffff', '#7cff01', '#ffaa00', '#ff69b4'];

listaPalabras.forEach((texto, i) => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 512; canvas.height = 128;
    ctx.font = 'bold 38px Segoe UI, Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'white';
    ctx.shadowBlur = 18;
    ctx.shadowColor = colors[i % colors.length];
    ctx.fillText(texto, 256, 80);

    const map = new THREE.CanvasTexture(canvas);
    const material = new THREE.SpriteMaterial({ map: map, transparent: true, opacity: 0.9 });
    const sprite = new THREE.Sprite(material);

    // Distribución esférica inmersiva
    const phi = Math.acos(-1 + (2 * i) / listaPalabras.length);
    const theta = Math.sqrt(listaPalabras.length * Math.PI) * phi;
    const dist = 30 + (i % 5) * 8; // Crea capas de profundidad

    sprite.position.setFromSphericalCoords(dist, phi, theta);
    sprite.scale.set(11, 2.8, 1);
    textGroup.add(sprite);
});
scene.add(textGroup);

// INTERACCIÓN
let warping = false;
let targetFOV = 70;
let rotationMultiplier = 1;

const startWarp = () => { warping = true; targetFOV = 120; rotationMultiplier = 18; };
const stopWarp = () => { warping = false; targetFOV = 70; rotationMultiplier = 1; };

window.addEventListener('mousedown', startWarp); window.addEventListener('mouseup', stopWarp);
window.addEventListener('touchstart', startWarp); window.addEventListener('touchend', stopWarp);

const clock = new THREE.Clock();
function animate() {
    requestAnimationFrame(animate);
    const time = clock.getElapsedTime();

    camera.fov += (targetFOV - camera.fov) * 0.08;
    camera.updateProjectionMatrix();

    textGroup.rotation.y += 0.0008 * rotationMultiplier;
    textGroup.rotation.z += 0.0003 * rotationMultiplier;
    starPoints.rotation.y -= 0.0001 * rotationMultiplier;

    // Movimiento orgánico
    textGroup.children.forEach((child, i) => {
        child.position.y += Math.sin(time + i) * 0.005;
    });

    core.rotation.y += 0.005;
    const pulse = 1 + Math.sin(time * 2.5) * 0.12;
    coreGlow.scale.set(20 * pulse, 20 * pulse, 1);

    controls.update();
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
